<!-- Cmd/Ctrl + Shift + F to open Quarto search -->
<script>
  document.addEventListener('keydown', function (e) {
    if ((e.metaKey || e.ctrlKey) && e.shiftKey && (e.key === 'F' || e.key === 'f')) {
      var btn = document.querySelector('#quarto-search .aa-DetachedSearchButton')
             || document.querySelector('#quarto-search button')
             || document.querySelector('#quarto-search');
      if (btn) {
        e.preventDefault();
        btn.click();
      }
    }
  });
</script>

<!-- Content-tab switcher for .doc-tabs blocks (assets/filters/obsidian-tabs.lua) -->
<script>
  document.addEventListener('DOMContentLoaded', function () {
    document.querySelectorAll('.doc-tabs').forEach(function (root) {
      var tabs = Array.prototype.slice.call(root.querySelectorAll('.doc-tabs__tab'));
      var panels = Array.prototype.slice.call(root.querySelectorAll('.doc-tabs__panel'));
      function activate(i) {
        tabs.forEach(function (t, j) {
          var on = j === i;
          t.classList.toggle('is-active', on);
          t.setAttribute('aria-selected', on ? 'true' : 'false');
          t.tabIndex = on ? 0 : -1;
          panels[j].classList.toggle('is-active', on);
          panels[j].hidden = !on;
        });
      }
      tabs.forEach(function (t, i) {
        t.addEventListener('click', function () { activate(i); });
        t.addEventListener('keydown', function (e) {
          var d = e.key === 'ArrowRight' ? 1 : e.key === 'ArrowLeft' ? -1 : 0;
          if (!d) return;
          e.preventDefault();
          var n = (i + d + tabs.length) % tabs.length;
          tabs[n].focus();
          activate(n);
        });
      });
    });
  });
</script>

<!-- Fill <span class="time-since" data-start="YYYY-MM" [data-end="YYYY-MM"]> with "(Xy Ymo)" -->
<script>
  (function () {
    function parseYM(s) {
      if (!s) return null;
      var parts = s.split('-').map(Number);
      return new Date(parts[0], parts[1] - 1, 1);
    }
    function fmt(years, months) {
      if (years === 0 && months === 0) return '(<1mo)';
      if (years === 0) return '(' + months + 'mo)';
      if (months === 0) return '(' + years + 'y)';
      return '(' + years + 'y ' + months + 'mo)';
    }
    document.querySelectorAll('.time-since').forEach(function (el) {
      var start = parseYM(el.dataset.start);
      if (!start) return;
      var end = parseYM(el.dataset.end) || new Date();
      var months = (end.getFullYear() - start.getFullYear()) * 12
                 + (end.getMonth() - start.getMonth());
      if (months < 0) months = 0;
      el.textContent = fmt(Math.floor(months / 12), months % 12);
    });
  })();
</script>
