<!-- Cmd/Ctrl + Shift + F to open Quarto search -->
<script>
  document.addEventListener('keydown', function (e) {
    if ((e.metaKey || e.ctrlKey) && e.shiftKey && (e.key === 'F' || e.key === 'f')) {
      var btn = document.querySelector('#quarto-search .aa-DetachedSearchButton')
             || document.querySelector('#quarto-search button')
             || document.querySelector('#quarto-search');
      if (btn) {
        e.preventDefault();
        btn.click();
      }
    }
  });
</script>

<!-- Content-tab switcher for .doc-tabs blocks (assets/filters/obsidian-tabs.lua) -->
<script>
  document.addEventListener('DOMContentLoaded', function () {
    document.querySelectorAll('.doc-tabs').forEach(function (root) {
      var tabs = Array.prototype.slice.call(root.querySelectorAll('.doc-tabs__tab'));
      var panels = Array.prototype.slice.call(root.querySelectorAll('.doc-tabs__panel'));
      function activate(i) {
        tabs.forEach(function (t, j) {
          var on = j === i;
          t.classList.toggle('is-active', on);
          t.setAttribute('aria-selected', on ? 'true' : 'false');
          t.tabIndex = on ? 0 : -1;
          panels[j].classList.toggle('is-active', on);
          panels[j].hidden = !on;
        });
      }
      tabs.forEach(function (t, i) {
        t.addEventListener('click', function () { activate(i); });
        t.addEventListener('keydown', function (e) {
          var d = e.key === 'ArrowRight' ? 1 : e.key === 'ArrowLeft' ? -1 : 0;
          if (!d) return;
          e.preventDefault();
          var n = (i + d + tabs.length) % tabs.length;
          tabs[n].focus();
          activate(n);
        });
      });
    });
  });
</script>

<!-- Sidebar section icons. The map (folder path segment -> Iconify id) is
     regenerated by scripts/sync_notes.py from each nested section's `icon:`
     frontmatter; the injector below is static. Quarto's auto-sidebar has no
     per-item template hook, so we inject the <iconify-icon> web component (the
     same reliable one the gallery cards use) into each section header on load.
     Matching is by folder path segment, present in the href both before and
     after Quarto's on-load href rewrite. -->
<!-- >>> sidebar-icons (regenerated by scripts/sync_notes.py) -->
<script>window.__SIDEBAR_ICONS__ = {
  "/003-data-engineering/002-snowflake/": "logos:snowflake-icon",
  "/003-data-engineering/003-dlt/": "simple-icons:dlthub",
  "/003-data-engineering/004-dbt/": "logos:dbt-icon",
  "/003-data-engineering/005-fastapi/": "logos:fastapi-icon"
};</script>
<!-- <<< sidebar-icons -->
<script>
  (function () {
    var MAP = window.__SIDEBAR_ICONS__ || {};
    function inject() {
      var links = document.querySelectorAll(
        '.sidebar-item-section > .sidebar-item-container > .sidebar-link'
      );
      links.forEach(function (link) {
        var href = link.getAttribute('href') || '';
        for (var seg in MAP) {
          if (href.indexOf(seg) === -1) continue;
          var menu = link.querySelector('.menu-text');
          if (menu && !menu.querySelector('iconify-icon.sidebar-section-icon')) {
            var ic = document.createElement('iconify-icon');
            ic.className = 'sidebar-section-icon';
            ic.setAttribute('icon', MAP[seg]);
            ic.setAttribute('aria-hidden', 'true');
            menu.insertBefore(ic, menu.firstChild);
          }
          break;
        }
      });
    }
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', inject);
    } else {
      inject();
    }
  })();
</script>

<!-- Fill <span class="time-since" data-start="YYYY-MM" [data-end="YYYY-MM"]> with "(Xy Ymo)" -->
<script>
  (function () {
    function parseYM(s) {
      if (!s) return null;
      var parts = s.split('-').map(Number);
      return new Date(parts[0], parts[1] - 1, 1);
    }
    function fmt(years, months) {
      if (years === 0 && months === 0) return '(<1mo)';
      if (years === 0) return '(' + months + 'mo)';
      if (months === 0) return '(' + years + 'y)';
      return '(' + years + 'y ' + months + 'mo)';
    }
    document.querySelectorAll('.time-since').forEach(function (el) {
      var start = parseYM(el.dataset.start);
      if (!start) return;
      var end = parseYM(el.dataset.end) || new Date();
      var months = (end.getFullYear() - start.getFullYear()) * 12
                 + (end.getMonth() - start.getMonth());
      if (months < 0) months = 0;
      el.textContent = fmt(Math.floor(months / 12), months % 12);
    });
  })();
</script>
