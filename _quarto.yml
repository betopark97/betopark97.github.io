project:
  type: website
  output-dir: _site
  render:
    - "*.qmd"
    - "*.md"
    - "!README.md"
    - "!docs/"
  resources:
    - assets/_aboutme.md

filters:
  - assets/filters/obsidian-callouts.lua
  - assets/filters/term-codeblocks.lua
  - assets/filters/responsive-tables.lua

format:
  html:
    theme:
      - assets/scss/catppuccin-mocha.scss
      - assets/scss/styles.scss
    toc: true
    html-math-method: katex
    code-line-numbers: true
    include-in-header: assets/html/custom_header.html
    include-after-body: assets/html/custom_body.html

website:
  title: "Roberto Park"
  favicon: assets/img/logos/logo.svg
  llms-txt: true

  page-navigation: true
  back-to-top-navigation: true

  navbar:
    title: "bp-pkm"
    background: light
    search: true
    left:
      - icon: github
        href: https://github.com/betopark97
    right:
      - href: index.md
        text: Home
      - href: portfolio.md
        text: Portfolio
      - href: projects/projects.md
        text: Projects
      - href: notes/index.md
        text: Notes
      - href: blog/index.md
        text: Blog

  sidebar:
    - id: projects
      title: "Projects"
      collapse-level: 1
      contents:
        - text: Gallery
          href: projects/projects.md
        - text: 1. Charon Analysis
          href: projects/charon-analysis/final_deliverable.md

    - id: blog
      title: "Blog"
      contents: blog/

    - id: notes
      collapse-level: 1
      contents:
        - notes/index.md
        # >>> auto-notes (regenerated by scripts/sync_notes.py)
        - href: notes/001-terminal/index.md
          contents:
            - auto: "notes/001-terminal/001-zsh/"
            - auto: "notes/001-terminal/002-homebrew/"
            - auto: "notes/001-terminal/003-kitty/"
        - href: notes/002-devops/index.md
          contents:
            - auto: "notes/002-devops/git-github/"
            - auto: "notes/002-devops/google-cloud-console/"
            - auto: "notes/002-devops/project-setup/"
        - href: notes/003-data-engineering/index.md
          contents:
            - auto: "notes/003-data-engineering/data-modeling/"
            - auto: "notes/003-data-engineering/dbt/"
            - auto: "notes/003-data-engineering/snowflake/"
        - auto: "notes/004-data-analysis/"
        - auto: "notes/005-business-intelligence/"
        - auto: "notes/006-machine-learning/"
        - href: notes/007-ai-engineering/index.md
          contents:
            - notes/007-ai-engineering/setup_configuration.md
            - auto: "notes/007-ai-engineering/spec-kit/"
        - href: notes/008-domain-knowledge/index.md
          contents:
            - auto: "notes/008-domain-knowledge/001-scm/"
        # <<< auto-notes

  page-footer:
    left: "Copyright 2024, Roberto Park"
    right:
      - icon: github
        href: https://github.com/betopark97
