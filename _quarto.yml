project:
  type: website
  output-dir: _site
  render:
    - "*.qmd"

format:
  html:
    theme:
      dark: theme/catppuccin-mocha.scss
      light: theme/catppuccin-latte.scss
    toc: true
    html-math-method: katex
    include-in-header: custom_header.html
    include-after-body: custom_body.html

website:
  title: "Roberto Park"

  page-navigation: true
  back-to-top-navigation: true

  navbar:
    background: light
    search: true
    right:
      - href: index.qmd
        text: Portfolio
      - href: manual/preface.qmd
        text: Data Analysis Manual
      - href: projects/projects.qmd
        text: Projects
      - href: blog/index.qmd
        text: Blog
      - href: study/index.qmd
        text: Study
      - icon: github
        href: https://github.com/betopark97

  sidebar:
    - id: manual
      title: "Data Analysis Manual"
      collapse-level: 1
      contents:
        - text: Preface
          href: manual/preface.qmd
        - text: 1. Project Setup
          href: manual/chapter1.qmd
        - text: 2. Problem & Ideas
          href: manual/chapter2.qmd

    - id: projects
      title: "Projects"
      collapse-level: 1
      contents:
        - text: Gallery
          href: projects/projects.qmd
        - text: 1. Charon Analysis
          href: projects/charon-analysis/final_deliverable.qmd

    - id: blog
      title: "Blog"
      contents: blog/

    - id: study
      title: "Study"
      contents: study/

  page-footer:
    left: "Copyright 2024, Roberto Park"
    right:
      - icon: github
        href: https://github.com/betopark97
