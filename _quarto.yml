project:
  type: website
  output-dir: _site
  render:
    - "*.qmd"
    - "*.md"
    - "!README.md"
    - "!docs/"
  resources:
    - assets/_aboutme.md

filters:
  - assets/filters/obsidian-callouts.lua
  - assets/filters/term-codeblocks.lua
  - assets/filters/responsive-tables.lua

# All displayed dates (blog title blocks, listings, any date/date-modified
# metadata) render as ISO 8601 (YYYY-MM-DD) site-wide.
date-format: iso

format:
  html:
    # Match Obsidian's markdown dialect site-wide: bare URLs auto-link, and a
    # single newline renders as a line break (pandoc's default joins lines).
    # Consequence: never soft-wrap prose in source files — one paragraph, one
    # line — and no trailing "\" / double-space needed to force a break.
    from: markdown+autolink_bare_uris+hard_line_breaks
    theme:
      - assets/scss/catppuccin-mocha.scss
      - assets/scss/styles.scss
    toc: true
    html-math-method: katex
    code-line-numbers: true
    include-in-header: assets/html/custom_header.html
    include-after-body: assets/html/custom_body.html

website:
  title: "Roberto Park"
  favicon: assets/img/logos/logo.svg
  llms-txt: true

  page-navigation: true
  back-to-top-navigation: true

  navbar:
    title: "bp-pkm"
    background: light
    search: true
    left:
      - icon: github
        href: https://github.com/betopark97
    right:
      - href: index.md
        text: Home
      - href: portfolio.md
        text: Portfolio
      - href: projects/projects.md
        text: Projects
      - href: notes/index.md
        text: Notes
      - href: blog/index.md
        text: Blog

  sidebar:
    - id: projects
      title: "Projects"
      collapse-level: 1
